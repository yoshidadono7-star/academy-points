<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HERO'S - 保護者ポータル</title>
  <link rel="icon" href="icons/icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f0f4ff; min-height: 100vh; }

    /* ===== LOGIN ===== */
    #loginScreen {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 36px 28px;
      width: 100%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25); text-align: center;
    }
    .login-icon { font-size: 48px; margin-bottom: 8px; }
    .login-title { font-size: 20px; font-weight: 800; color: #2d3748; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: #718096; margin-bottom: 24px; }
    .login-label { font-size: 12px; font-weight: 600; color: #4a5568; text-align: left; display: block; margin-bottom: 4px; }
    .login-input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; font-size: 14px; margin-bottom: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: #667eea; }
    .login-btn {
      width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 10px; font-size: 15px;
      font-weight: 700; cursor: pointer; margin-top: 4px;
    }
    .login-error { color: #e53e3e; font-size: 12px; min-height: 18px; margin-bottom: 8px; }

    /* ===== MAIN ===== */
    #mainContent { display: none; }
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .header-title { color: #fff; font-size: 16px; font-weight: 800; }
    .header-sub { color: rgba(255,255,255,0.75); font-size: 11px; }
    .logout-btn {
      background: rgba(255,255,255,0.2); border: none; color: #fff;
      padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
    }

    .container { max-width: 680px; margin: 0 auto; padding: 16px; }
    .card {
      background: #fff; border-radius: 14px; padding: 18px;
      margin-bottom: 14px; box-shadow: 0 2px 12px rgba(102,126,234,0.08);
    }
    .card-title {
      font-size: 14px; font-weight: 700; color: #4a5568;
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }

    /* ===== STATS ===== */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box {
      background: #f0f4ff; border-radius: 10px; padding: 14px; text-align: center;
    }
    .stat-label { font-size: 10px; font-weight: 700; color: #667eea; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 800; color: #4c51bf; }
    .stat-unit { font-size: 12px; font-weight: 500; }

    /* ===== HEATMAP ===== */
    .heatmap { display: grid; grid-template-columns: repeat(14, 1fr); gap: 3px; margin-top: 8px; }
    .heatmap-cell {
      aspect-ratio: 1; border-radius: 3px;
    }

    /* ===== SUBJECTS ===== */
    .subject-bar { margin-bottom: 10px; }
    .subject-name { font-size: 12px; color: #4a5568; margin-bottom: 3px; display: flex; justify-content: space-between; }
    .bar-bg { background: #e2e8f0; border-radius: 4px; height: 8px; }
    .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.6s; }

    /* ===== BADGES ===== */
    .badges-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge-item {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: 10px; padding: 8px 12px; font-size: 12px;
      display: flex; align-items: center; gap: 6px; font-weight: 600; color: #78350f;
    }
    .badge-item.locked { background: #f1f5f9; color: #94a3b8; }

    /* ===== MESSAGES ===== */
    .msg-item { padding: 12px; background: #f8fafc; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid #667eea; }
    .msg-type { font-size: 10px; font-weight: 700; color: #667eea; margin-bottom: 4px; }
    .msg-text { font-size: 13px; color: #2d3748; line-height: 1.6; }
    .msg-date { font-size: 10px; color: #94a3b8; margin-top: 4px; }

    /* ===== EXAMS ===== */
    .exam-item { padding: 12px; background: #f8fafc; border-radius: 10px; margin-bottom: 8px; }
    .exam-name { font-size: 13px; font-weight: 700; color: #2d3748; }
    .exam-date { font-size: 11px; color: #94a3b8; }
    .exam-score { font-size: 20px; font-weight: 800; color: #4c51bf; }
    .subject-scores { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .subject-score-tag {
      background: #e0e7ff; color: #4338ca; font-size: 11px;
      padding: 3px 8px; border-radius: 6px; font-weight: 600;
    }

    /* ===== LOADING ===== */
    .loading { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e2e8f0;
      border-top-color: #667eea; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== LEVEL ===== */
    .level-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff; padding: 4px 12px; border-radius: 20px;
      font-size: 13px; font-weight: 700;
    }
    .points-bar-wrap { margin-top: 8px; }
    .points-bar-bg { background: #e2e8f0; border-radius: 6px; height: 10px; }
    .points-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #667eea, #764ba2); }

    /* ===== TABS ===== */
    .tabs { display: flex; gap: 4px; background: #f0f4ff; border-radius: 10px; padding: 4px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 8px 4px; border: none; background: none;
      border-radius: 8px; font-size: 11px; font-weight: 600; color: #718096; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: #fff; color: #667eea; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .empty-msg { text-align: center; padding: 24px; color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">👨‍👩‍👧</div>
    <div class="login-title">保護者ポータル</div>
    <div class="login-sub">HERO'S 保護者ポータル</div>

    <label class="login-label">お子さんのニックネーム</label>
    <input type="text" id="loginNickname" class="login-input" placeholder="例: タロー"
      onkeydown="if(event.key==='Enter') document.getElementById('loginPin').focus()">

    <label class="login-label">保護者PINコード（4桁）</label>
    <input type="password" id="loginPin" class="login-input" placeholder="••••"
      maxlength="4" inputmode="numeric"
      onkeydown="if(event.key==='Enter') parentLogin()">

    <p class="login-error" id="loginError"></p>
    <button class="login-btn" onclick="parentLogin()">ログイン</button>
    <p style="font-size:11px;color:#a0aec0;margin-top:12px;">PINコードは塾からお知らせした番号です</p>
  </div>
</div>

<!-- ===== メインコンテンツ ===== -->
<div id="mainContent">
  <div class="header">
    <div>
      <div class="header-title">👨‍👩‍👧 保護者ポータル</div>
      <div class="header-sub" id="headerStudentName">-</div>
    </div>
    <button class="logout-btn" onclick="parentLogout()">ログアウト</button>
  </div>

  <div class="container">
    <div id="loadingMsg" class="loading">
      <div class="spinner"></div>
      データを読み込んでいます...
    </div>

    <div id="portalContent" style="display:none;">

      <!-- プロフィール -->
      <div class="card" style="background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <p style="font-size:11px; opacity:0.8; margin-bottom:2px;" id="portalGrade">-</p>
            <p style="font-size:22px; font-weight:800;" id="portalNickname">-</p>
            <p style="font-size:12px; opacity:0.8;" id="portalSchool">-</p>
          </div>
          <div style="text-align:right;">
            <div class="level-badge" id="portalLevel">Lv. -</div>
            <p style="font-size:12px; opacity:0.8; margin-top:8px;" id="portalStreak">連続通塾: -日</p>
          </div>
        </div>
      </div>

      <!-- タブ切替 -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('summary')">📊 サマリー</button>
        <button class="tab-btn" onclick="switchTab('exams')">📝 テスト</button>
        <button class="tab-btn" onclick="switchTab('badges')">🏅 バッジ</button>
        <button class="tab-btn" onclick="switchTab('messages')">💬 メッセージ</button>
      </div>

      <!-- サマリータブ -->
      <div class="tab-panel active" id="panel-summary">
        <div class="card">
          <div class="card-title">📅 直近30日間の学習</div>
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-label">学習日数</div>
              <div class="stat-value" id="stat-days">-<span class="stat-unit">日</span></div>
            </div>
            <div class="stat-box">
              <div class="stat-label">総学習時間</div>
              <div class="stat-value" id="stat-hours">-<span class="stat-unit">h</span></div>
            </div>
            <div class="stat-box">
              <div class="stat-label">ポモドーロ</div>
              <div class="stat-value" id="stat-pomo">-<span class="stat-unit">回</span></div>
            </div>
            <div class="stat-box">
              <div class="stat-label">連続学習</div>
              <div class="stat-value" id="stat-streak">-<span class="stat-unit">日</span></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📅 直近14日間の学習活動</div>
          <div class="heatmap" id="heatmap"></div>
          <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:#94a3b8;">
            <span>少ない</span>
            <div style="display:flex;gap:3px;align-items:center;">
              <div style="width:12px;height:12px;background:#e2e8f0;border-radius:2px;"></div>
              <div style="width:12px;height:12px;background:#bbf7d0;border-radius:2px;"></div>
              <div style="width:12px;height:12px;background:#4ade80;border-radius:2px;"></div>
              <div style="width:12px;height:12px;background:#16a34a;border-radius:2px;"></div>
            </div>
            <span>多い</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📚 科目別学習時間（30日）</div>
          <div id="subjectBars"></div>
        </div>

        <div class="card">
          <div class="card-title">😊 最近のコンディション</div>
          <div id="conditionList"></div>
        </div>
      </div>

      <!-- テスト結果タブ -->
      <div class="tab-panel" id="panel-exams">
        <div class="card">
          <div class="card-title">📝 テスト結果履歴</div>
          <div id="examsList"></div>
        </div>
      </div>

      <!-- バッジタブ -->
      <div class="tab-panel" id="panel-badges">
        <div class="card">
          <div class="card-title">🏅 獲得バッジ <span id="badgeCount" style="font-size:12px;font-weight:500;color:#718096;"></span></div>
          <div class="badges-grid" id="badgesList"></div>
        </div>
      </div>

      <!-- メッセージタブ -->
      <div class="tab-panel" id="panel-messages">
        <div class="card">
          <div class="card-title">💬 先生からのメッセージ</div>
          <p style="font-size:11px;color:#94a3b8;margin-bottom:12px;">※ メッセージの内容は閲覧のみです</p>
          <div id="messagesList"></div>
        </div>
      </div>

    </div><!-- /portalContent -->
  </div><!-- /container -->
</div><!-- /mainContent -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

let currentStudent = null;

// ===== ログイン =====
async function parentLogin() {
  const nickname = document.getElementById('loginNickname').value.trim();
  const pin = document.getElementById('loginPin').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';

  if (!nickname || !pin) {
    errEl.textContent = 'ニックネームとPINを入力してください';
    return;
  }

  try {
    const snap = await db.collection('students')
      .where('nickname', '==', nickname).limit(5).get();

    if (snap.empty) {
      errEl.textContent = 'ニックネームが見つかりません';
      return;
    }

    let found = null;
    snap.forEach(d => {
      const s = d.data();
      if (String(s.parentPin) === String(pin)) {
        found = { id: d.id, ...s };
      }
    });

    if (!found) {
      errEl.textContent = 'PINコードが間違っています';
      return;
    }

    currentStudent = found;
    localStorage.setItem('heros_parent', JSON.stringify({ id: found.id, nickname, pin }));
    await showPortal();
  } catch(e) {
    errEl.textContent = 'エラーが発生しました: ' + e.message;
  }
}

function parentLogout() {
  if (!confirm('ログアウトしますか？')) return;
  currentStudent = null;
  localStorage.removeItem('heros_parent');
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPin').value = '';
}

// ===== 自動ログイン =====
async function tryAutoLogin() {
  const saved = JSON.parse(localStorage.getItem('heros_parent') || 'null');
  if (!saved) return;
  try {
    const doc = await db.collection('students').doc(saved.id).get();
    if (doc.exists && String(doc.data().parentPin) === String(saved.pin)) {
      currentStudent = { id: doc.id, ...doc.data() };
      await showPortal();
    }
  } catch(e) {}
}

// ===== ポータル表示 =====
async function showPortal() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('portalContent').style.display = 'none';

  try {
    const s = currentStudent;
    document.getElementById('headerStudentName').textContent = `${s.nickname}さんの学習状況`;
    document.getElementById('portalNickname').textContent = s.nickname;
    document.getElementById('portalGrade').textContent = s.grade || '';
    document.getElementById('portalSchool').textContent = s.school || '';

    // レベル計算
    const pts = s.totalPoints || s.points || 0;
    const level = (typeof calcLevel === 'function') ? calcLevel(pts) : Math.floor(pts / 500) + 1;
    document.getElementById('portalLevel').textContent = `Lv. ${level}`;
    document.getElementById('portalStreak').textContent = `連続通塾: ${s.streak || 0}日`;

    await Promise.allSettled([
      loadSummary(),
      loadExams(),
      loadBadges(),
      loadMessages(),
    ]);
  } catch(e) {
    console.error('showPortal error:', e);
  }

  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('portalContent').style.display = 'block';
}

// ===== タブ切替 =====
function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    const tabs = ['summary', 'exams', 'badges', 'messages'];
    b.classList.toggle('active', tabs[i] === tabId);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tabId).classList.add('active');
}

// ===== サマリー =====
async function loadSummary() {
  try {
  const sid = currentStudent.id;
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const day30ago = new Date(now.getTime() - 30 * 24*60*60*1000).toISOString().slice(0,10);
  const day14ago = new Date(now.getTime() - 14 * 24*60*60*1000).toISOString().slice(0,10);

  // studyLogsから取得（dateフィールドはYYYY-MM-DD文字列）
  const sessSnap = await db.collection('studyLogs')
    .where('studentId', '==', sid)
    .orderBy('date', 'desc').limit(200).get();
  const logs = sessSnap.docs.map(d => d.data());

  const recent30 = logs.filter(s => s.date >= day30ago);
  const recent14 = logs.filter(s => s.date >= day14ago);

  // 学習日数・時間
  const days30 = new Set(recent30.map(s => s.date)).size;
  const totalMins = recent30.reduce((sum, s) => sum + (s.duration || 0), 0);
  document.getElementById('stat-days').innerHTML = `${days30}<span class="stat-unit">日</span>`;
  document.getElementById('stat-hours').innerHTML = `${(totalMins/60).toFixed(1)}<span class="stat-unit">h</span>`;

  // ポモドーロ回数
  const totalPomo = recent30.reduce((sum, s) => sum + (s.pomodoroCount || 0), 0);
  document.getElementById('stat-pomo').innerHTML = `${totalPomo}<span class="stat-unit">回</span>`;

  // 連続日数
  const allDates = [...new Set(logs.map(s => s.date))].sort().reverse();
  let streak = 0;
  let checkDate = today;
  for (const d of allDates) {
    if (d === checkDate) {
      streak++;
      const prev = new Date(checkDate + 'T00:00:00');
      prev.setDate(prev.getDate() - 1);
      checkDate = prev.toISOString().slice(0,10);
    } else if (d < checkDate) break;
  }
  document.getElementById('stat-streak').innerHTML = `${streak}<span class="stat-unit">日</span>`;

  // ヒートマップ（14日）
  const heatmap = document.getElementById('heatmap');
  heatmap.innerHTML = '';
  for (let d = 13; d >= 0; d--) {
    const date = new Date(now.getTime() - d * 24*60*60*1000);
    const dateStr = date.toISOString().slice(0,10);
    const dayMins = recent14.filter(s => s.date === dateStr)
      .reduce((sum, s) => sum + (s.duration || 0), 0);
    const intensity = dayMins === 0 ? 0 : dayMins < 30 ? 1 : dayMins < 60 ? 2 : 3;
    const colors = ['#e2e8f0', '#bbf7d0', '#4ade80', '#16a34a'];
    const cell = document.createElement('div');
    cell.className = 'heatmap-cell';
    cell.style.background = colors[intensity];
    cell.title = `${dateStr}: ${dayMins}分`;
    heatmap.appendChild(cell);
  }

  // 科目バランス
  const subjectMins = {};
  recent30.forEach(s => {
    if (s.subject) subjectMins[s.subject] = (subjectMins[s.subject] || 0) + (s.duration || 0);
  });
  const maxMins = Math.max(...Object.values(subjectMins), 1);
  const barContainer = document.getElementById('subjectBars');
  if (Object.keys(subjectMins).length === 0) {
    barContainer.innerHTML = '<p class="empty-msg">学習記録がありません</p>';
  } else {
    barContainer.innerHTML = Object.entries(subjectMins)
      .sort((a,b) => b[1]-a[1])
      .map(([subj, mins]) => `
        <div class="subject-bar">
          <div class="subject-name">
            <span>${subj}</span>
            <span style="color:#667eea;font-weight:700;">${Math.floor(mins/60)}時間${mins%60}分</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(mins/maxMins*100)}%"></div></div>
        </div>`).join('');
  }

  // コンディション
  const condSnap = await db.collection('conditions')
    .where('studentId', '==', sid)
    .orderBy('createdAt', 'desc').limit(5).get();
  const condList = document.getElementById('conditionList');
  if (condSnap.empty) {
    condList.innerHTML = '<p class="empty-msg">コンディション記録がありません</p>';
  } else {
    condList.innerHTML = condSnap.docs.map(d => {
      const c = d.data();
      const date = c.createdAt?.toMillis ? new Date(c.createdAt.toMillis()).toLocaleDateString('ja-JP') : (c.date || '');
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9;">
        <span style="font-size:20px;">${c.mood || '😊'}</span>
        <div style="flex:1;">
          <div style="font-size:11px;color:#94a3b8;">${date}</div>
          <div style="font-size:12px;color:#4a5568;">${c.motivation || ''} ${c.comment ? '「' + c.comment + '」' : ''}</div>
        </div>
      </div>`;
    }).join('');
  }
  } catch(e) { console.error('loadSummary error:', e); }
}

// ===== テスト結果 =====
async function loadExams() {
  try {
  const snap = await db.collection('examResults')
    .where('studentId', '==', currentStudent.id)
    .orderBy('date', 'desc').limit(10).get();
  const container = document.getElementById('examsList');
  if (snap.empty) {
    container.innerHTML = '<p class="empty-msg">テスト結果がまだありません</p>';
    return;
  }
  container.innerHTML = snap.docs.map(d => {
    const e = d.data();
    const pct = e.maxTotalScore > 0 ? Math.round(e.totalScore / e.maxTotalScore * 100) : 0;
    const color = pct >= 80 ? '#059669' : pct >= 60 ? '#d97706' : '#dc2626';
    const subjectTags = (e.subjects || []).map(s =>
      `<span class="subject-score-tag">${s.name} ${s.score}/${s.maxScore}</span>`
    ).join('');
    return `
      <div class="exam-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="exam-name">${e.examName || ''}</div>
            <div class="exam-date">${e.date || ''}</div>
          </div>
          <div style="text-align:right;">
            <div class="exam-score" style="color:${color};">${e.totalScore || 0}<span style="font-size:12px;font-weight:500;">/${e.maxTotalScore || 0}</span></div>
            <div style="font-size:11px;color:${color};font-weight:700;">${pct}%</div>
          </div>
        </div>
        ${subjectTags ? `<div class="subject-scores">${subjectTags}</div>` : ''}
      </div>`;
  }).join('');
  } catch(e) { console.error('loadExams error:', e); }
}

  raid_killer: { icon: '⚔️', name: 'レイドボス討伐' },
};

async function loadBadges() {
  try {
  const snap = await db.collection('badges')
    .where('studentId', '==', currentStudent.id)
    .orderBy('awardedAt', 'desc').get();
  const container = document.getElementById('badgesList');
  const count = snap.size;
  document.getElementById('badgeCount').textContent = `${count}個獲得`;

  if (snap.empty) {
    container.innerHTML = '<p class="empty-msg">まだバッジがありません</p>';
    return;
  }
  container.innerHTML = snap.docs.map(d => {
    const b = d.data();
    const def = BADGE_DEFS[b.badgeId] || { icon: '🏅', name: b.badgeId };
    const date = b.awardedAt?.toMillis ? new Date(b.awardedAt.toMillis()).toLocaleDateString('ja-JP') : '';
    return `<div class="badge-item" title="${date}">
      <span>${def.icon}</span><span>${def.name}</span>
    </div>`;
  }).join('');
  } catch(e) { console.error('loadBadges error:', e); }
}

// ===== メッセージ =====
async function loadMessages() {
  try {
  const snap = await db.collection('messages')
    .where('toStudentId', '==', currentStudent.id)
    .orderBy('createdAt', 'desc').limit(20).get();
  const container = document.getElementById('messagesList');
  if (snap.empty) {
    container.innerHTML = '<p class="empty-msg">メッセージはありません</p>';
    return;
  }
  container.innerHTML = snap.docs.map(d => {
    const m = d.data();
    const date = m.createdAt?.toMillis ? new Date(m.createdAt.toMillis()).toLocaleDateString('ja-JP') : '';
    return `<div class="msg-item">
      <div class="msg-text">${m.content || ''}</div>
      <div class="msg-date">${date}</div>
    </div>`;
  }).join('');
  } catch(e) { console.error('loadMessages error:', e); }
}
