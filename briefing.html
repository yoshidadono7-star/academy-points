<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミッションコントロール - HERO'S</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap');

:root {
  --bg-dark: #0a0e27;
  --bg-panel: #111638;
  --bg-card: #1a1f4e;
  --accent-blue: #00d4ff;
  --accent-green: #00ff88;
  --accent-orange: #ff8800;
  --accent-red: #ff3366;
  --accent-purple: #8866ff;
  --text-primary: #e8ecff;
  --text-secondary: #7a82b0;
  --glow-blue: 0 0 20px rgba(0,212,255,0.3);
  --glow-green: 0 0 20px rgba(0,255,136,0.3);
}

body {
  background: var(--bg-dark);
  color: var(--text-primary);
  font-family: 'Noto Sans JP', sans-serif;
  overflow: hidden;
  height: 100vh;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ヘッダー */
.header {
  background: linear-gradient(135deg, var(--bg-panel), #0d1240);
  border-bottom: 2px solid var(--accent-blue);
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: var(--glow-blue);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 900;
  color: var(--accent-blue);
  text-shadow: var(--glow-blue);
  letter-spacing: 3px;
}
.status-badge {
  background: rgba(0,255,136,0.15);
  border: 1px solid var(--accent-green);
  color: var(--accent-green);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'Orbitron', monospace;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
  font-family: 'Orbitron', monospace;
  font-size: 14px;
}
.clock {
  color: var(--accent-blue);
  font-size: 20px;
  font-weight: 700;
}
.crew-count {
  color: var(--accent-green);
}

/* 艦長マイケル ブリーフィング */
.commander-briefing {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 14px 24px;
  background: linear-gradient(90deg, rgba(0,212,255,0.08), rgba(136,102,255,0.1), rgba(0,212,255,0.08));
  border-bottom: 1px solid rgba(0,212,255,0.3);
  box-shadow: inset 0 -1px 20px rgba(0,212,255,0.05);
  min-height: 130px;
  position: relative;
  overflow: hidden;
}
.commander-briefing::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 15% 50%, rgba(0,212,255,0.12), transparent 45%);
  pointer-events: none;
}
.commander-portrait {
  flex: 0 0 100px;
  width: 100px;
  height: 100px;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 0 16px rgba(0,212,255,0.45));
}
.commander-portrait svg {
  width: 100%;
  height: 100%;
  display: block;
}
.commander-portrait .ring {
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid rgba(0,212,255,0.5);
  animation: commanderRingSpin 8s linear infinite;
  pointer-events: none;
}
.commander-portrait .ring::before,
.commander-portrait .ring::after {
  content: '';
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent-blue);
  box-shadow: 0 0 10px var(--accent-blue);
}
.commander-portrait .ring::before { top: -4px; left: 50%; transform: translateX(-50%); }
.commander-portrait .ring::after  { bottom: -4px; left: 50%; transform: translateX(-50%); }
@keyframes commanderRingSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.commander-speech {
  flex: 1;
  min-width: 0;
  position: relative;
  z-index: 1;
}
.commander-name {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--accent-blue);
  text-transform: uppercase;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.commander-name .rank {
  background: rgba(0,212,255,0.15);
  border: 1px solid rgba(0,212,255,0.4);
  border-radius: 4px;
  padding: 1px 8px;
  font-size: 10px;
}
.commander-name .source-tag {
  background: rgba(136,102,255,0.15);
  border: 1px solid rgba(136,102,255,0.4);
  color: var(--accent-purple);
  border-radius: 4px;
  padding: 1px 8px;
  font-size: 10px;
  letter-spacing: 1px;
}
.commander-bubble {
  position: relative;
  background: rgba(10,14,39,0.7);
  border: 1px solid rgba(0,212,255,0.35);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 15px;
  line-height: 1.55;
  color: var(--text-primary);
  font-weight: 500;
  min-height: 52px;
  max-width: calc(100vw - 260px);
}
.commander-bubble::after {
  content: '';
  position: absolute;
  left: -10px;
  top: 20px;
  width: 0;
  height: 0;
  border-top: 8px solid transparent;
  border-bottom: 8px solid transparent;
  border-right: 10px solid rgba(0,212,255,0.35);
}
.commander-bubble .cursor {
  display: inline-block;
  width: 8px;
  height: 15px;
  background: var(--accent-blue);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: commanderCursor 0.9s steps(2) infinite;
}
@keyframes commanderCursor {
  50% { opacity: 0; }
}
.commander-controls {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  z-index: 1;
}
.commander-controls button {
  background: rgba(0,212,255,0.1);
  border: 1px solid rgba(0,212,255,0.4);
  color: var(--accent-blue);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 11px;
  cursor: pointer;
  font-family: 'Orbitron', monospace;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.commander-controls button:hover {
  background: rgba(0,212,255,0.2);
  box-shadow: 0 0 12px rgba(0,212,255,0.3);
}

/* メインレイアウト */
.main {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 12px;
  flex: 1;
  min-height: 0;
  overflow: auto;
}

/* パネル共通 */
.panel {
  background: var(--bg-panel);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 12px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
}
.panel-title {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--accent-blue);
  letter-spacing: 2px;
  margin-bottom: 12px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title .icon {
  font-size: 16px;
}

/* ミッションパネル（左上） */
.mission-panel {
  grid-column: 1 / 2;
}

/* 宇宙マップパネル */
.spacemap-panel {
  overflow-y: auto;
}
.spacemap-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.spacemap-student {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 12px;
}
.spacemap-student-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.spacemap-station-icon { font-size: 16px; }
.spacemap-station-name { font-size: 10px; color: var(--text-secondary); }

/* ストーリーパネル */
.story-panel {
  text-align: center;
}
.story-theme-icon { font-size: 36px; margin-bottom: 4px; }
.story-theme-name {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  color: var(--accent-purple);
  margin-bottom: 8px;
}
.story-weekly-text {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  text-align: left;
  padding: 8px;
  background: var(--bg-card);
  border-radius: 8px;
  margin-bottom: 8px;
  max-height: 60px;
  overflow-y: auto;
}
.story-routes {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.story-route {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 11px;
}
.story-route-bar {
  flex: 1;
  background: rgba(0,0,0,0.3);
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
}
.story-route-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
  transition: width 1s ease;
}

/* ボスパネル強化 */
.boss-panel {
  overflow-y: auto;
}
.boss-mini {
  background: var(--bg-card);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 6px;
}
.boss-mini-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.boss-mini-icon { font-size: 28px; }
.boss-mini-name {
  font-weight: 700;
  font-size: 13px;
  flex: 1;
}
.boss-mini-hp {
  background: rgba(0,0,0,0.3);
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 4px;
}
.boss-mini-hp-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
  transition: width 1s ease;
}
.boss-mini-attrs {
  display: flex;
  gap: 4px;
  font-size: 10px;
  flex-wrap: wrap;
}
.boss-attr-tag {
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 600;
}
.boss-attr-weak { background: rgba(255,51,102,0.2); color: var(--accent-red); }
.boss-attr-resist { background: rgba(0,212,255,0.2); color: var(--accent-blue); }
.boss-attr-special { background: rgba(136,102,255,0.2); color: var(--accent-purple); }

/* コマンダーバフ演出 */
.commander-buff-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,215,0,0.1);
  z-index: 90;
  pointer-events: none;
  animation: commanderGlow 3s ease-out forwards;
}
.commander-buff-overlay.show { display: block; }
@keyframes commanderGlow {
  0% { background: rgba(255,215,0,0.3); }
  100% { background: rgba(255,215,0,0); display: none; }
}
.commander-buff-banner {
  display: none;
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #ffd700, #ff8800);
  color: #1a1a2e;
  padding: 8px 24px;
  border-radius: 8px;
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  z-index: 95;
  box-shadow: 0 0 30px rgba(255,215,0,0.5);
  animation: fadeInOut 4s ease forwards;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; display: none; }
}
.mission-name {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text-primary);
}
.mission-metric {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.progress-container {
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  height: 32px;
  position: relative;
  overflow: hidden;
  margin-bottom: 12px;
}
.progress-bar {
  height: 100%;
  border-radius: 8px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
  transition: width 1s ease;
  position: relative;
}
.progress-bar::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.progress-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  z-index: 2;
}
.milestones {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.milestone {
  flex: 1;
  background: var(--bg-card);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
  transition: all 0.3s;
}
.milestone.reached {
  border-color: var(--accent-green);
  background: rgba(0,255,136,0.08);
}
.milestone .stage {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.milestone .name {
  font-size: 13px;
  font-weight: 700;
}
.milestone .coins {
  font-size: 11px;
  color: var(--accent-orange);
  margin-top: 4px;
}
.milestone.reached .name {
  color: var(--accent-green);
}

/* ランキングパネル（右上） */
.ranking-panel { }
.ranking-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ranking-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-card);
  border-radius: 8px;
  transition: all 0.3s;
}
.ranking-item:nth-child(1) {
  border-left: 3px solid #ffd700;
  background: rgba(255,215,0,0.08);
}
.ranking-item:nth-child(2) {
  border-left: 3px solid #c0c0c0;
}
.ranking-item:nth-child(3) {
  border-left: 3px solid #cd7f32;
}
.ranking-pos {
  font-family: 'Orbitron', monospace;
  font-size: 16px;
  font-weight: 700;
  width: 28px;
  text-align: center;
  color: var(--accent-blue);
}
.ranking-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
}
.ranking-rank-icon { font-size: 14px; }
.ranking-coins {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  color: var(--accent-orange);
}

/* ライブフィードパネル（左下） */
.feed-panel { overflow: hidden; }
.feed-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: calc(100% - 30px);
  overflow: hidden;
}
.feed-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 13px;
  animation: feedIn 0.5s ease;
  border-left: 3px solid var(--accent-blue);
}
.feed-item.special {
  border-left-color: var(--accent-orange);
  background: rgba(255,136,0,0.08);
}
.feed-item.milestone-feed {
  border-left-color: var(--accent-green);
  background: rgba(0,255,136,0.08);
}
.feed-item.rookie-feed {
  border-left-color: var(--accent-purple);
  background: rgba(136,102,255,0.08);
}
@keyframes feedIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.feed-icon { font-size: 16px; }
.feed-text { flex: 1; }

/* イベントパネル（中央下） */
.event-panel { text-align: center; }
.event-inactive {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: calc(100% - 30px);
  color: var(--text-secondary);
}
.event-inactive .icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}
.event-inactive .text {
  font-size: 14px;
}
.event-active {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: calc(100% - 30px);
}
.event-active.show {
  display: flex;
}
.event-name {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent-orange);
  text-shadow: 0 0 20px rgba(255,136,0,0.5);
  margin-bottom: 8px;
  animation: eventPulse 1s infinite;
}
@keyframes eventPulse {
  0%, 100% { text-shadow: 0 0 20px rgba(255,136,0,0.5); }
  50% { text-shadow: 0 0 40px rgba(255,136,0,0.8); }
}
.event-multiplier {
  font-family: 'Orbitron', monospace;
  font-size: 48px;
  font-weight: 900;
  color: var(--accent-orange);
  margin: 8px 0;
}
.event-timer {
  font-family: 'Orbitron', monospace;
  font-size: 24px;
  color: var(--accent-red);
  margin-top: 8px;
}
.event-description {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
}

/* 統計パネル（右下） */
.stats-panel { }
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  height: calc(100% - 30px);
}
.stat-card {
  background: var(--bg-card);
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.stat-value {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--accent-blue);
}
.stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.stat-card.green .stat-value { color: var(--accent-green); }
.stat-card.orange .stat-value { color: var(--accent-orange); }
.stat-card.purple .stat-value { color: var(--accent-purple); }

/* イベント通知オーバーレイ */
.event-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.event-overlay.show {
  display: flex;
  animation: overlayIn 0.5s ease;
}
@keyframes overlayIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.event-overlay-icon {
  font-size: 80px;
  animation: bounce 0.5s ease;
}
@keyframes bounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}
.event-overlay-title {
  font-family: 'Orbitron', monospace;
  font-size: 36px;
  font-weight: 900;
  color: var(--accent-orange);
  text-shadow: 0 0 30px rgba(255,136,0,0.6);
  margin: 16px 0;
}
.event-overlay-desc {
  font-size: 18px;
  color: var(--text-secondary);
}

/* ミッション達成オーバーレイ */
.mission-complete-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.mission-complete-overlay.show {
  display: flex;
}
.mission-complete-text {
  font-family: 'Orbitron', monospace;
  font-size: 48px;
  font-weight: 900;
  color: var(--accent-green);
  text-shadow: 0 0 40px rgba(0,255,136,0.6);
  animation: missionPulse 1s infinite;
  text-align: center;
}
@keyframes missionPulse {
  0%, 100% { transform: scale(1); text-shadow: 0 0 40px rgba(0,255,136,0.6); }
  50% { transform: scale(1.05); text-shadow: 0 0 60px rgba(0,255,136,0.9); }
}
.mission-complete-sub {
  font-size: 20px;
  color: var(--text-primary);
  margin-top: 16px;
}

/* ローディング */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  flex-direction: column;
  gap: 16px;
}
.loading-spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--bg-card);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* レスポンシブ */
@media (max-width: 1280px) {
  .main {
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto;
  }
  .mission-panel { grid-column: 1 / 2; }
  .commander-bubble { max-width: calc(100vw - 240px); }
}
@media (max-width: 1024px) {
  .main {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
  }
  .mission-panel { grid-column: 1 / -1; }
  .commander-briefing {
    gap: 14px;
    padding: 12px 16px;
    min-height: 110px;
  }
  .commander-portrait {
    flex: 0 0 84px;
    width: 84px;
    height: 84px;
  }

    font-size: 14px;
    padding: 10px 14px;
    max-width: calc(100vw - 200px);
  }

}

    gap: 10px;
    padding: 10px 12px;

<script>
// === ミッションコントロール画面 ===
let currentMission = null;
let activeEvent = null;
let feedItems = [];
const MAX_FEED = 12;
let previousMilestoneState = {};

// 時計更新
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}
setInterval(updateClock, 1000);
updateClock();

// ライブフィードに追加
function addFeed(icon, text, type = '') {
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  feedItems.unshift({ icon, text, time, type });
  if (feedItems.length > MAX_FEED) feedItems.pop();
  renderFeed();
}

function renderFeed() {
  const el = document.getElementById('feedList');
  el.innerHTML = feedItems.map(f =>
    `<div class="feed-item ${f.type}">
      <span class="feed-time">${f.time}</span>
      <span class="feed-icon">${f.icon}</span>
      <span class="feed-text">${f.text}</span>
    </div>`
  ).join('');
}

// ミッション表示更新
function renderMission(mission) {
  if (!mission) {
    document.getElementById('missionName').textContent = '現在アクティブなミッションはありません';
    document.getElementById('missionMetric').textContent = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = '--';
    document.getElementById('progressValues').textContent = '';
    document.getElementById('missionDays').textContent = '';
    document.getElementById('milestones').innerHTML = '';
    return;
  }

  currentMission = mission;
  const percent = Math.min(100, Math.round((mission.currentValue / mission.targetValue) * 100));

  const metricLabels = {
    total_hours: '全クルー合計学習時間',
    total_pomodoros: '全クルー合計ポモドーロ数',
    teaching_count: '教え合い発生回数',
    ai_problems: 'AI教材取組問題数',
    all_streak: '全クルー同時連続通塾日数'
  };

  document.getElementById('missionName').textContent = mission.title;
  document.getElementById('missionMetric').textContent =
    `計測指標: ${metricLabels[mission.metric] || mission.metric}`;
  document.getElementById('progressBar').style.width = percent + '%';
  document.getElementById('progressText').textContent = percent + '%';
  document.getElementById('progressValues').textContent =
    `${mission.currentValue.toLocaleString()} / ${mission.targetValue.toLocaleString()}`;

  // 残り日数
  if (mission.endDate) {
    const end = new Date(mission.endDate);
    const now = new Date();
    const days = Math.max(0, Math.ceil((end - now) / 86400000));
    document.getElementById('missionDays').textContent = `残り ${days} 日`;
  }

  // マイルストーン
  const ms = mission.milestones || [];
  document.getElementById('milestones').innerHTML = ms.map(m =>
    `<div class="milestone ${m.reached ? 'reached' : ''}">
      <div class="stage">${m.percent}%</div>
      <div class="name">${m.reached ? '✅ ' : ''}${m.name}</div>
      <div class="coins">+${m.coins} pt</div>
    </div>`
  ).join('');

  // 新たに到達したマイルストーンの検出
  ms.forEach(m => {
    const key = `${mission.id}_${m.stage}`;
    if (m.reached && !previousMilestoneState[key]) {
      addFeed('🎉', `マイルストーン「${m.name}」到達！ 全クルーに+${m.coins}ポイント`, 'milestone-feed');
    }
    previousMilestoneState[key] = m.reached;
  });

  // ミッション達成
  if (mission.status === 'completed') {
    showMissionComplete(mission);
  }
}

// ランキング表示（月間ポイント獲得量・上位5名）
async function renderRanking() {
  try {
    const students = await StudentsDB.getAll();
    // 月間獲得量で並べる（totalEarnedがない場合はtotalPoints使用）
    const sorted = students
      .filter(s => s.rank !== 'rookie') // ルーキーは非表示
      .sort((a, b) => (b.totalEarned || b.totalPoints || 0) - (a.totalEarned || a.totalPoints || 0))
      .slice(0, 5);

    const el = document.getElementById('rankingList');
    el.innerHTML = sorted.map((s, i) => {
      const rank = getRankInfo(s.rank || 'crew');
      const coins = s.totalEarned || s.totalPoints || 0;
      const displayName = s.callsign || s.nickname || s.name;
      return `<div class="ranking-item">
        <span class="ranking-pos">${i + 1}</span>
        <span class="ranking-rank-icon">${rank.icon}</span>
        <span class="ranking-name">${displayName}</span>
        <span class="ranking-coins">${coins.toLocaleString()}</span>
      </div>`;
    }).join('');

    document.getElementById('crewCount').textContent = students.length;
  } catch(e) {
    console.error('ランキング取得エラー:', e);
  }
}

// 本日の統計
async function renderStats() {
  try {
    const today = getToday();
    const logs = await StudyLogsDB.getByDate(today);
    const students = await StudentsDB.getAll();

    const totalMin = logs.reduce((s, l) => s + (l.duration || 0), 0);
    const totalPomo = logs.reduce((s, l) => s + (l.pomodoroCount || 0), 0);
    const bestStreak = Math.max(0, ...students.map(s => s.streak || 0));

    document.getElementById('statStudyHours').textContent =
      (totalMin / 60).toFixed(1);
    document.getElementById('statPomodoros').textContent = totalPomo;
    document.getElementById('statStreak').textContent = bestStreak;

    // 発行ポイント数
    try {
      const summary = await CoinsDB.getDailySummary(today);
      document.getElementById('statCoinsIssued').textContent = summary.totalIssued;
    } catch(e) {
      document.getElementById('statCoinsIssued').textContent = '--';
    }
  } catch(e) {
    console.error('統計取得エラー:', e);
  }
}

// イベント表示
async function renderEvent() {
  try {
    const events = await EventsDB.getActive();
    if (events.length > 0) {
      const ev = events[0];
      activeEvent = ev;
      document.getElementById('eventInactive').style.display = 'none';
      document.getElementById('eventActive').classList.add('show');

      const typeLabels = {
        multiplier: '🚀 ブースター',
        bonus: '🎁 ボーナス',
        challenge: '⚔️ チャレンジ',
        surprise: '🎉 サプライズ'
      };
      document.getElementById('eventName').textContent = typeLabels[ev.type] || ev.name;

      if (ev.type === 'multiplier') {
        document.getElementById('eventMultiplier').textContent = `×${ev.multiplier}`;
      } else if (ev.type === 'bonus' || ev.type === 'surprise') {
        document.getElementById('eventMultiplier').textContent = `+${ev.bonusCoins}`;
      } else {
        document.getElementById('eventMultiplier').textContent = '⚡';
      }

      document.getElementById('eventDescription').textContent = ev.description || '';

      // 残り時間カウントダウン
      updateEventTimer(ev);
    } else {
      activeEvent = null;
      document.getElementById('eventInactive').style.display = 'flex';
      document.getElementById('eventActive').classList.remove('show');
    }
  } catch(e) {
    console.error('イベント取得エラー:', e);
  }
}

function updateEventTimer(ev) {
  if (!ev || !ev.activatedAt) return;
  const activated = ev.activatedAt.toDate ? ev.activatedAt.toDate() : new Date(ev.activatedAt);
  const endTime = new Date(activated.getTime() + (ev.durationMinutes || 30) * 60000);
  const now = new Date();
  const remaining = Math.max(0, endTime - now);
  const min = Math.floor(remaining / 60000);
  const sec = Math.floor((remaining % 60000) / 1000);
  document.getElementById('eventTimer').textContent =
    `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

  }
}

// リアルタイムリスナー
function setupListeners() {
  // ミッションのリアルタイム監視
  db.collection('missions').where('status', '==', 'active')
    .onSnapshot(snap => {
      if (!snap.empty) {
        const mission = { id: snap.docs[0].id, ...snap.docs[0].data() };
        renderMission(mission);
      } else {
        renderMission(null);
      }
    });

  // イベントのリアルタイム監視
  db.collection('events').where('active', '==', true)
    .onSnapshot(snap => {
      if (!snap.empty) {
        const ev = { id: snap.docs[0].id, ...snap.docs[0].data() };
        if (!activeEvent || activeEvent.id !== ev.id) {
          // 新しいイベントが発火された
          const typeIcons = { multiplier: '🚀', bonus: '🎁', challenge: '⚔️', surprise: '🎉' };
          showEventOverlay(
            ev.name || ev.type,
            typeIcons[ev.type] || '⚡',
            ev.description || 'イベント発動中！'
          );
          addFeed(typeIcons[ev.type] || '⚡', `イベント「${ev.name || ev.type}」発動！`, 'special');
        }
        activeEvent = ev;
        renderEvent();
      } else {
        if (activeEvent) {
          addFeed('🏁', 'イベント終了');
        }
        activeEvent = null;
        renderEvent();
      }
    });

  // 学習ログのリアルタイム監視（ライブフィード用）
  const today = getToday();
  db.collection('studyLogs').where('date', '==', today)
    .orderBy('createdAt', 'desc').limit(1)
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if (change.type === 'added') {
          const log = change.doc.data();
          const subjectIcons = { '国語': '📕', '数学': '📐', '英語': '🔤', '理科': '🔬', '社会': '🌍', 'その他': '📝' };
          const icon = subjectIcons[log.subject] || '📖';
          const dur = log.duration || 0;
          const name = log.studentName || 'クルー';
          addFeed(icon, `${name} が ${log.subject} を ${dur}分 学習完了`);
        }
      });
      renderStats();
    });

  // ポイント取引のリアルタイム監視
  db.collection('coins').orderBy('timestamp', 'desc').limit(1)
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if (change.type === 'added') {
          const txn = change.doc.data();
          if (txn.amount > 0 && txn.category !== 'manual') {
            const catIcons = {
              attendance: '🏫', pomodoro: '🍅', review: '📝', teaching: '🤝',
              streak: '🔥', mission: '🎯', event: '⚡', gift: '🎁'
            };
            const icon = catIcons[txn.category] || 'pt';
            // ライブフィードに表示（頻度調整のため一部のみ）
          }
        }
      });
      renderStats();
    });

  // アクティブセッション（現在出撃中）の監視
  let prevActiveIds = new Set();
  db.collection('activeSessions').where('active', '==', true)
    .onSnapshot(async snap => {
      const sessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const currentIds = new Set(sessions.map(s => s.id));
      // 新しく出撃した生徒をフィードに追加
      const students = await StudentsDB.getAll();
      const sMap = {};
      students.forEach(s => { sMap[s.id] = s; });

      sessions.forEach(sess => {
        if (!prevActiveIds.has(sess.id)) {
          const st = sMap[sess.id];
          const display = st ? (st.callsign || st.nickname || st.name) : 'クルー';
          addFeed('🚀', `${display} が ${sess.subject} に出撃！`);
        }
      });
      // 帰還した生徒
      prevActiveIds.forEach(id => {
        if (!currentIds.has(id)) {
          const st = sMap[id];
          const display = st ? (st.callsign || st.nickname || st.name) : 'クルー';
          addFeed('✅', `${display} が帰還！`, 'milestone-feed');
        }
      });
      prevActiveIds = currentIds;

      // 統計パネル横に出撃中人数を表示
      const crewCount = document.getElementById('crewCount');
      if (crewCount) {
        const total = students.length;
        crewCount.textContent = sessions.length > 0 ? `${total} (${sessions.length}名出撃中)` : total;
      }
    }, () => {});
}

// ============================================
// 艦長マイケル - ブリーフィングメッセージ生成
// ============================================
// データソース優先順位:
//   1. 手動上書き (Firestore: dailyBriefing/{YYYY-MM-DD}.manualOverride)
//   2. AI 生成キャッシュ (Firestore: dailyBriefing/{YYYY-MM-DD}.aiMessage)
//   3. Claude API で新規生成 → 上記にキャッシュ
//   4. ルールベースのフォールバック（API エラー時）
// ============================================

let commanderTypewriterTimer = null;

function commanderSetMessage(text, source) {
  const el = document.getElementById('commanderMessage');
  const tag = document.getElementById('commanderSourceTag');
  if (!el) return;
  // タイプライター演出
  if (commanderTypewriterTimer) { clearInterval(commanderTypewriterTimer); commanderTypewriterTimer = null; }
  el.innerHTML = '';
  const cursor = '<span class="cursor"></span>';
  let i = 0;
  const chars = Array.from(text); // サロゲートペア対応
  commanderTypewriterTimer = setInterval(() => {
    if (i >= chars.length) {
      clearInterval(commanderTypewriterTimer);
      commanderTypewriterTimer = null;
      el.innerHTML = chars.join('') + cursor;
      return;
    }
    i++;
    el.innerHTML = chars.slice(0, i).join('') + cursor;
  }, 35);
  // ソースタグ
  if (tag) {
    if (source === 'manual') {
      tag.textContent = '手動';
      tag.style.display = 'inline-block';
      tag.style.background = 'rgba(0,255,136,0.15)';
      tag.style.borderColor = 'rgba(0,255,136,0.4)';
      tag.style.color = 'var(--accent-green)';
    } else if (source === 'ai') {
      tag.textContent = 'AI';
      tag.style.display = 'inline-block';
      tag.style.background = 'rgba(136,102,255,0.15)';
      tag.style.borderColor = 'rgba(136,102,255,0.4)';
      tag.style.color = 'var(--accent-purple)';
    } else if (source === 'fallback') {
      tag.textContent = '自動';
      tag.style.display = 'inline-block';
      tag.style.background = 'rgba(0,212,255,0.15)';
      tag.style.borderColor = 'rgba(0,212,255,0.4)';
      tag.style.color = 'var(--accent-blue)';
    } else {
      tag.style.display = 'none';
    }
  }
  // 旧ナレーション互換
  const legacy = document.getElementById('briefingNarrationText');
  if (legacy) legacy.textContent = text;
}

// 今日のブリーフィング状況を Firestore から取得
async function commanderFetchContext() {
  const students = await StudentsDB.getAll();
  const today = new Date().toISOString().split('T')[0];
  const todayLogs = await StudyLogsDB.getByDate(today);
  let boss = null;
  try {
    const bosses = await RaidBossDB.getActive();
    boss = bosses.length > 0 ? bosses[0] : null;
  } catch(e) {}
  let story = null;
  try { story = await StoryDB.getActive(); } catch(e) {}

  const totalCrew = students.length;
  const activeCrew = new Set(todayLogs.map(l => l.studentId)).size;
  const todayMinutes = todayLogs.reduce((s, l) => s + (l.duration || 0), 0);

  // 今日誕生日の生徒
  const todayMMDD = today.slice(5); // "MM-DD"
  const birthdayStudents = students.filter(s => {
    if (!s.birthday) return false;
    const b = String(s.birthday).slice(-5);
    return b === todayMMDD;
  }).map(s => s.callsign || s.nickname || s.name);

  return { students, todayLogs, boss, story, totalCrew, activeCrew, todayMinutes, birthdayStudents, today };
}

// ルールベースのフォールバックメッセージ（AI エラー時のみ使用）
function commanderBuildFallback(ctx) {
  const parts = [];
  const hour = new Date().getHours();
  if (hour < 12) parts.push('おはよう、諸君。本日の航海が始動した。');
  else if (hour < 17) parts.push('諸君、午後の探索フェーズに入った。');
  else parts.push('諸君、本日の航海も終盤だ。');

  parts.push(`全${ctx.totalCrew}名のクルーのうち${ctx.activeCrew}名が任務中。`);

  if (ctx.todayMinutes > 0) {
    parts.push(`艦隊の総学習時間は${Math.floor(ctx.todayMinutes / 60)}時間${ctx.todayMinutes % 60}分。`);
  }

  if (ctx.birthdayStudents.length > 0) {
    parts.push(`本日は ${ctx.birthdayStudents.join('、')} の誕生日だ。おめでとう！`);
  }

  if (ctx.boss) {
    const hpPct = Math.round((ctx.boss.currentHp / ctx.boss.maxHp) * 100);
    if (hpPct <= 25) parts.push(`${ctx.boss.icon || '👹'}${ctx.boss.name}は瀕死！ 総攻撃の好機だ。`);
    else if (hpPct <= 50) parts.push(`${ctx.boss.icon || '👹'}${ctx.boss.name}のHP${hpPct}%。攻勢を維持せよ。`);
    else parts.push(`前方に${ctx.boss.icon || '👹'}${ctx.boss.name}を確認。HP${hpPct}%。`);
  }

  return parts.join(' ');
}

// Claude API でブリーフィングメッセージを生成
async function commanderGenerateWithAI(ctx) {
  // 既存の AI 設定を流用
  let config;
  try {
    const doc = await db.collection('settings').doc('claudeAi').get();
    if (doc.exists) config = doc.data();
  } catch(e) {}
  if (!config || !config.apiKey || config.enabled === false) {
    throw new Error('Claude API 未設定');
  }

  const hour = new Date().getHours();
  const timeWord = hour < 12 ? '朝' : (hour < 17 ? '昼過ぎ' : '夕方');
  const bossText = ctx.boss
    ? `レイドボス「${ctx.boss.name}」HP ${Math.round((ctx.boss.currentHp / ctx.boss.maxHp) * 100)}%`
    : 'レイドボスなし';
  const birthdayText = ctx.birthdayStudents.length > 0
    ? `今日誕生日: ${ctx.birthdayStudents.join('、')}`
    : '今日誕生日の生徒はいない';
  const storyText = ctx.story && ctx.story.currentChapter
    ? `ストーリー「${ctx.story.currentChapter.title || ctx.story.title || ''}」進行中`
    : '';

  const systemPrompt = `あなたは学習塾 HERO'S ACADEMY の宇宙戦艦「ミッションコントロール」の艦長マイケル。` +
    `教室の大型モニターに常時表示されるブリーフィング画面の上部で、一日のメインメッセージをクルー（生徒）に向けて語る役目。` +
    `キャラクター像: 歴戦の宇宙艦長、口髭の紳士、威厳と温かさを併せ持つ、時々ジョークを交える、生徒を「諸君」「クルー」と呼ぶ。` +
    `制約: 必ず 80 文字以内の日本語 1〜2 文。絵文字は最大 2 個まで。宇宙・航海の比喩を交える。質問や対話形式は禁止、一方的な宣言のみ。`;

  const userPrompt = `現在の艦隊状況:\n` +
    `- 時間帯: ${timeWord}\n` +
    `- 全クルー: ${ctx.totalCrew}名\n` +
    `- 任務中クルー: ${ctx.activeCrew}名\n` +
    `- 本日の総学習時間: ${Math.floor(ctx.todayMinutes / 60)}時間${ctx.todayMinutes % 60}分\n` +
    `- ${bossText}\n` +
    `- ${birthdayText}\n` +
    (storyText ? `- ${storyText}\n` : '') +
    `\n上記を踏まえて、今日のメインメッセージを 80 文字以内で 1〜2 文、艦長マイケルらしい口調で述べよ。`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': config.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json'
    },
    body: JSON.stringify({
      model: config.model || 'claude-haiku-4-5-20251001',
      max_tokens: 250,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });

  if (!res.ok) throw new Error(`Claude API ${res.status}`);
  const data = await res.json();
  const text = (data.content && data.content[0] && data.content[0].text || '').trim();
  if (!text) throw new Error('空レスポンス');
  return text;
}

// メインの初期化 / 更新関数
async function generateBriefingNarration(forceAI) {
  try {
    const ctx = await commanderFetchContext();
    const today = ctx.today;

    // 1. Firestore から今日のブリーフィングドキュメントを取得
    let briefingDoc = null;
    try {
      const snap = await db.collection('dailyBriefing').doc(today).get();
      if (snap.exists) briefingDoc = snap.data();
    } catch(e) { console.warn('[commander] dailyBriefing fetch failed:', e); }

    // 2. 手動上書きがあれば最優先
    if (briefingDoc && briefingDoc.manualOverride && !forceAI) {
      commanderSetMessage(briefingDoc.manualOverride, 'manual');
      return;
    }

    // 3. AI キャッシュが今日のものとしてあれば流用（forceAI=true なら無視）
    if (briefingDoc && briefingDoc.aiMessage && !forceAI) {
      commanderSetMessage(briefingDoc.aiMessage, 'ai');
      return;
    }

    // 4. Claude API で新規生成
    try {
      const msg = await commanderGenerateWithAI(ctx);
      // Firestore にキャッシュ
      try {
        await db.collection('dailyBriefing').doc(today).set({
          aiMessage: msg,
          generatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          context: {
            totalCrew: ctx.totalCrew,
            activeCrew: ctx.activeCrew,
            todayMinutes: ctx.todayMinutes,
          }
        }, { merge: true });
      } catch(e) { console.warn('[commander] cache write failed:', e); }
      commanderSetMessage(msg, 'ai');
      return;
    } catch(e) {
      console.warn('[commander] AI generate failed, using fallback:', e);
    }

    // 5. フォールバック
    commanderSetMessage(commanderBuildFallback(ctx), 'fallback');
  } catch(e) {
    console.error('Briefing narration error:', e);
    commanderSetMessage('通信エラー。ミッションコントロールの再起動を試みよ。', 'fallback');
  }
}

async function renderGuildProgress() {
  const container = document.getElementById('guildProgressDisplay');
  try {
    const guilds = await GuildsDB.getProgress();
    if (guilds.length === 0) { container.innerHTML = '<div style="color:var(--text-secondary);font-size:11px">ギルドなし</div>'; return; }
    container.innerHTML = guilds.map(g => {
      const ms = g.milestones || (typeof GUILD_MILESTONES !== 'undefined' ? GUILD_MILESTONES.map(m => ({...m, unlocked: false})) : []);
      const nextMs = ms.find(m => !m.unlocked);
      const pct = nextMs ? Math.min(100, Math.round((g.totalPoints || 0) / nextMs.threshold * 100)) : 100;
      const msIcons = ms.map(m => '<span style="opacity:' + (m.unlocked ? '1' : '0.3') + ';font-size:12px">' + m.icon + '</span>').join(' ');
      return '<div style="background:linear-gradient(135deg,' + (g.color||'#667eea') + '40,' + (g.color||'#667eea') + '15);border:1px solid ' + (g.color||'#667eea') + '60;border-radius:8px;padding:8px 10px;margin-bottom:4px;">' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">' +
        '<span style="font-size:16px">' + (g.icon||'⚔️') + '</span>' +
        '<span style="font-size:12px;font-weight:700;flex:1;color:#e8ecff">' + g.name + '</span>' +
        '<span style="font-size:10px;color:' + (g.color||'#00d4ff') + ';font-family:Orbitron,monospace">' + (g.totalPoints||0).toLocaleString() + '</span>' +
        '</div>' +
        '<div style="background:rgba(0,0,0,0.3);border-radius:4px;height:5px;margin-bottom:3px"><div style="background:' + (g.color||'#00d4ff') + ';height:5px;border-radius:4px;width:' + pct + '%;transition:width 1s"></div></div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center"><div>' + msIcons + '</div><div style="font-size:9px;color:var(--text-secondary)">' + (nextMs ? '次: ' + nextMs.icon + nextMs.name : '全達成!') + '</div></div>' +
        '</div>';
    }).join('');
  } catch(e) { console.error('Guild progress error:', e); container.innerHTML = ''; }
}

// リーグランキング表示
async function renderLeagueRanking() {
  const container = document.getElementById('leagueRankDisplay');
  try {
    if (typeof LEAGUES === 'undefined') { container.innerHTML = ''; return; }
    const students = await StudentsDB.getAll();
    let html = '';
    for (const [id, league] of Object.entries(LEAGUES)) {
      const ls = students.filter(s => getLeague(s.grade) === id).sort((a,b) => (b.totalPoints||0) - (a.totalPoints||0)).slice(0, 3);
      if (ls.length === 0) continue;
      html += '<div style="margin-bottom:8px">';
      html += '<div style="font-size:10px;font-family:Orbitron,monospace;color:' + league.color + ';margin-bottom:4px;letter-spacing:1px">' + league.icon + ' ' + league.name + '</div>';
      ls.forEach((s, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
        const display = s.callsign || s.nickname || '???';
        html += '<div style="display:flex;align-items:center;gap:6px;padding:3px 6px;background:var(--bg-card);border-radius:4px;margin-bottom:2px;font-size:11px">' +
          '<span>' + medal + '</span>' +
          '<span style="flex:1;font-weight:600">' + display + '</span>' +
          '<span style="color:var(--accent-orange);font-family:Orbitron,monospace;font-size:10px">' + (s.totalPoints||0).toLocaleString() + '</span>' +
          '</div>';
      });
      html += '</div>';
    }
    container.innerHTML = html || '<div style="color:var(--text-secondary);font-size:11px">データなし</div>';
  } catch(e) { console.error('League ranking error:', e); }
}

async function init() {
  try {
    await Promise.all([
      renderRanking(),
      renderStats(),
      renderEvent(),
      renderSpaceMap(),
      renderBossPanel(),
      renderGuildProgress(),
      renderLeagueRanking()
    ]);

    // 初期フィードメッセージ
    addFeed('🛸', 'ミッションコントロール起動完了');

    setupListeners();

    // コマンダーバフチェック
    checkCommanderBuff();

    // ナレーション生成
    generateBriefingNarration();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch(e) {
    console.error('初期化エラー:', e);
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--accent-red);font-family:'Orbitron',monospace">SYSTEM ERROR</div>
       <div style="color:var(--text-secondary);margin-top:8px">${e.message}</div>`;
  }
}

// 定期リフレッシュ（5分おき）
setInterval(async () => {
  await renderRanking();
  await renderStats();
  await renderSpaceMap();
  await renderBossPanel();
  await renderGuildProgress();
  await renderLeagueRanking();
  checkCommanderBuff();
}, 300000);

init();
</script>
