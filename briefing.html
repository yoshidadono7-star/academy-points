<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミッションコントロール - HERO'S</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap');

:root {
  --bg-dark: #0a0e27;
  --bg-panel: #111638;
  --bg-card: #1a1f4e;
  --accent-blue: #00d4ff;
  --accent-green: #00ff88;
  --accent-orange: #ff8800;
  --accent-red: #ff3366;
  --accent-purple: #8866ff;
  --text-primary: #e8ecff;
  --text-secondary: #7a82b0;
  --glow-blue: 0 0 20px rgba(0,212,255,0.3);
  --glow-green: 0 0 20px rgba(0,255,136,0.3);
}

body {
  background: var(--bg-dark);
  color: var(--text-primary);
  font-family: 'Noto Sans JP', sans-serif;
  overflow: hidden;
  height: 100vh;
}

/* ヘッダー */
.header {
  background: linear-gradient(135deg, var(--bg-panel), #0d1240);
  border-bottom: 2px solid var(--accent-blue);
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: var(--glow-blue);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 900;
  color: var(--accent-blue);
  text-shadow: var(--glow-blue);
  letter-spacing: 3px;
}
.status-badge {
  background: rgba(0,255,136,0.15);
  border: 1px solid var(--accent-green);
  color: var(--accent-green);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'Orbitron', monospace;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
  font-family: 'Orbitron', monospace;
  font-size: 14px;
}
.clock {
  color: var(--accent-blue);
  font-size: 20px;
  font-weight: 700;
}
.crew-count {
  color: var(--accent-green);
}

/* メインレイアウト */
.main {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 12px;
  height: calc(100vh - 70px);
}

/* パネル共通 */
.panel {
  background: var(--bg-panel);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 12px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
}
.panel-title {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--accent-blue);
  letter-spacing: 2px;
  margin-bottom: 12px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title .icon {
  font-size: 16px;
}

/* ミッションパネル（左上） */
.mission-panel {
  grid-column: 1 / 2;
}

/* 宇宙マップパネル */
.spacemap-panel {
  overflow-y: auto;
}
.spacemap-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.spacemap-student {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 12px;
}
.spacemap-student-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.spacemap-station-icon { font-size: 16px; }
.spacemap-station-name { font-size: 10px; color: var(--text-secondary); }

/* ストーリーパネル */
.story-panel {
  text-align: center;
}
.story-theme-icon { font-size: 36px; margin-bottom: 4px; }
.story-theme-name {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  color: var(--accent-purple);
  margin-bottom: 8px;
}
.story-weekly-text {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  text-align: left;
  padding: 8px;
  background: var(--bg-card);
  border-radius: 8px;
  margin-bottom: 8px;
  max-height: 60px;
  overflow-y: auto;
}
.story-routes {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.story-route {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 11px;
}
.story-route-bar {
  flex: 1;
  background: rgba(0,0,0,0.3);
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
}
.story-route-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
  transition: width 1s ease;
}

/* ボスパネル強化 */
.boss-panel {
  overflow-y: auto;
}
.boss-mini {
  background: var(--bg-card);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 6px;
}
.boss-mini-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.boss-mini-icon { font-size: 28px; }
.boss-mini-name {
  font-weight: 700;
  font-size: 13px;
  flex: 1;
}
.boss-mini-hp {
  background: rgba(0,0,0,0.3);
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 4px;
}
.boss-mini-hp-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
  transition: width 1s ease;
}
.boss-mini-attrs {
  display: flex;
  gap: 4px;
  font-size: 10px;
  flex-wrap: wrap;
}
.boss-attr-tag {
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 600;
}
.boss-attr-weak { background: rgba(255,51,102,0.2); color: var(--accent-red); }
.boss-attr-resist { background: rgba(0,212,255,0.2); color: var(--accent-blue); }
.boss-attr-special { background: rgba(136,102,255,0.2); color: var(--accent-purple); }

/* コマンダーバフ演出 */
.commander-buff-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,215,0,0.1);
  z-index: 90;
  pointer-events: none;
  animation: commanderGlow 3s ease-out forwards;
}
.commander-buff-overlay.show { display: block; }
@keyframes commanderGlow {
  0% { background: rgba(255,215,0,0.3); }
  100% { background: rgba(255,215,0,0); display: none; }
}
.commander-buff-banner {
  display: none;
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #ffd700, #ff8800);
  color: #1a1a2e;
  padding: 8px 24px;
  border-radius: 8px;
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  z-index: 95;
  box-shadow: 0 0 30px rgba(255,215,0,0.5);
  animation: fadeInOut 4s ease forwards;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; display: none; }
}
.mission-name {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text-primary);
}
.mission-metric {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.progress-container {
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  height: 32px;
  position: relative;
  overflow: hidden;
  margin-bottom: 12px;
}
.progress-bar {
  height: 100%;
  border-radius: 8px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
  transition: width 1s ease;
  position: relative;
}
.progress-bar::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.progress-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  z-index: 2;
}
.milestones {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.milestone {
  flex: 1;
  background: var(--bg-card);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
  transition: all 0.3s;
}
.milestone.reached {
  border-color: var(--accent-green);
  background: rgba(0,255,136,0.08);
}
.milestone .stage {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.milestone .name {
  font-size: 13px;
  font-weight: 700;
}
.milestone .coins {
  font-size: 11px;
  color: var(--accent-orange);
  margin-top: 4px;
}
.milestone.reached .name {
  color: var(--accent-green);
}

/* ランキングパネル（右上） */
.ranking-panel { }
.ranking-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ranking-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-card);
  border-radius: 8px;
  transition: all 0.3s;
}
.ranking-item:nth-child(1) {
  border-left: 3px solid #ffd700;
  background: rgba(255,215,0,0.08);
}
.ranking-item:nth-child(2) {
  border-left: 3px solid #c0c0c0;
}
.ranking-item:nth-child(3) {
  border-left: 3px solid #cd7f32;
}
.ranking-pos {
  font-family: 'Orbitron', monospace;
  font-size: 16px;
  font-weight: 700;
  width: 28px;
  text-align: center;
  color: var(--accent-blue);
}
.ranking-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
}
.ranking-rank-icon { font-size: 14px; }
.ranking-coins {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  color: var(--accent-orange);
}

/* ライブフィードパネル（左下） */
.feed-panel { overflow: hidden; }
.feed-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: calc(100% - 30px);
  overflow: hidden;
}
.feed-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 13px;
  animation: feedIn 0.5s ease;
  border-left: 3px solid var(--accent-blue);
}
.feed-item.special {
  border-left-color: var(--accent-orange);
  background: rgba(255,136,0,0.08);
}
.feed-item.milestone-feed {
  border-left-color: var(--accent-green);
  background: rgba(0,255,136,0.08);
}
.feed-item.rookie-feed {
  border-left-color: var(--accent-purple);
  background: rgba(136,102,255,0.08);
}
@keyframes feedIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.feed-icon { font-size: 16px; }
.feed-text { flex: 1; }

/* イベントパネル（中央下） */
.event-panel { text-align: center; }
.event-inactive {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: calc(100% - 30px);
  color: var(--text-secondary);
}
.event-inactive .icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}
.event-inactive .text {
  font-size: 14px;
}
.event-active {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: calc(100% - 30px);
}
.event-active.show {
  display: flex;
}
.event-name {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent-orange);
  text-shadow: 0 0 20px rgba(255,136,0,0.5);
  margin-bottom: 8px;
  animation: eventPulse 1s infinite;
}
@keyframes eventPulse {
  0%, 100% { text-shadow: 0 0 20px rgba(255,136,0,0.5); }
  50% { text-shadow: 0 0 40px rgba(255,136,0,0.8); }
}
.event-multiplier {
  font-family: 'Orbitron', monospace;
  font-size: 48px;
  font-weight: 900;
  color: var(--accent-orange);
  margin: 8px 0;
}
.event-timer {
  font-family: 'Orbitron', monospace;
  font-size: 24px;
  color: var(--accent-red);
  margin-top: 8px;
}
.event-description {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
}

/* 統計パネル（右下） */
.stats-panel { }
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  height: calc(100% - 30px);
}
.stat-card {
  background: var(--bg-card);
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.stat-value {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--accent-blue);
}
.stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.stat-card.green .stat-value { color: var(--accent-green); }
.stat-card.orange .stat-value { color: var(--accent-orange); }
.stat-card.purple .stat-value { color: var(--accent-purple); }

/* イベント通知オーバーレイ */
.event-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.event-overlay.show {
  display: flex;
  animation: overlayIn 0.5s ease;
}
@keyframes overlayIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.event-overlay-icon {
  font-size: 80px;
  animation: bounce 0.5s ease;
}
@keyframes bounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}
.event-overlay-title {
  font-family: 'Orbitron', monospace;
  font-size: 36px;
  font-weight: 900;
  color: var(--accent-orange);
  text-shadow: 0 0 30px rgba(255,136,0,0.6);
  margin: 16px 0;
}
.event-overlay-desc {
  font-size: 18px;
  color: var(--text-secondary);
}

/* ミッション達成オーバーレイ */
.mission-complete-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.mission-complete-overlay.show {
  display: flex;
}
.mission-complete-text {
  font-family: 'Orbitron', monospace;
  font-size: 48px;
  font-weight: 900;
  color: var(--accent-green);
  text-shadow: 0 0 40px rgba(0,255,136,0.6);
  animation: missionPulse 1s infinite;
  text-align: center;
}
@keyframes missionPulse {
  0%, 100% { transform: scale(1); text-shadow: 0 0 40px rgba(0,255,136,0.6); }
  50% { transform: scale(1.05); text-shadow: 0 0 60px rgba(0,255,136,0.9); }
}
.mission-complete-sub {
  font-size: 20px;
  color: var(--text-primary);
  margin-top: 16px;
}

/* ローディング */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  flex-direction: column;
  gap: 16px;
}
.loading-spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--bg-card);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* レスポンシブ */
@media (max-width: 1280px) {
  .main {
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto;
  }
  .mission-panel { grid-column: 1 / 2; }
}
@media (max-width: 1024px) {
  .main {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
  }
  .mission-panel { grid-column: 1 / -1; }
}
@keyframes eventGlow {
  0%, 100% { box-shadow: 0 0 10px rgba(255,136,0,0.3); }
  50% { box-shadow: 0 0 30px rgba(255,136,0,0.7), 0 0 60px rgba(255,136,0,0.3); }
}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="loading-spinner"></div>
  <div style="font-family:'Orbitron',monospace;color:var(--accent-blue)">ミッションコントロール起動中...</div>
</div>

<div id="app" style="display:none">
  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <div class="logo">ミッションコントロール</div>
      <div class="status-badge">稼働中</div>
    </div>
    <div class="header-right">
      <div class="crew-count">クルー: <span id="crewCount">--</span>名</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </div>

  <!-- ナレーション -->
  <div id="briefingNarration" style="background:rgba(0,212,255,0.08);border-bottom:1px solid rgba(0,212,255,0.2);padding:8px 24px;font-size:13px;line-height:1.6;color:var(--text-secondary);">
    <span style="color:var(--accent-blue);margin-right:6px;">📖</span>
    <span id="briefingNarrationText">航海日誌を読み込んでいます...</span>
  </div>

  <!-- メインパネル -->
  <div class="main">
    <!-- ミッション進捗（左上・中上） -->
    <div class="panel mission-panel">
      <div class="panel-title"><span class="icon">🎯</span> 今月のミッション</div>
      <div class="mission-name" id="missionName">ミッション読込中...</div>
      <div class="mission-metric" id="missionMetric"></div>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
        <div class="progress-text" id="progressText">0%</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-family:'Orbitron',monospace;font-size:13px;color:var(--accent-blue)" id="progressValues">0 / 0</span>
        <span style="font-size:12px;color:var(--text-secondary)" id="missionDays"></span>
      </div>
      <div class="milestones" id="milestones"></div>
    </div>

    <!-- 宇宙マップ（中上） -->
    <div class="panel spacemap-panel">
      <div class="panel-title"><span class="icon">🌌</span> 宇宙マップ</div>
      <div class="spacemap-list" id="spacemapList"></div>
    </div>

    <!-- ランキング（右上） -->
    <div class="panel ranking-panel">
      <div class="panel-title"><span class="icon">🏆</span> 月間ランキング</div>
      <div class="ranking-list" id="rankingList"></div>
    </div>

    <!-- ライブフィード（左下） -->
    <div class="panel feed-panel">
      <div class="panel-title"><span class="icon">📡</span> リアルタイム通信</div>
      <div class="feed-list" id="feedList"></div>
    </div>

    <!-- ストーリー＋ギルド進捗（中下左） -->
    <div class="panel story-panel" style="text-align:left;">
      <div class="panel-title"><span class="icon">⚔️</span> ギルド協力進捗</div>
      <div id="guildProgressDisplay"></div>
      <!-- イベント（下部に統合） -->
      <div id="eventSection" style="margin-top:8px;border-top:1px solid rgba(0,212,255,0.15);padding-top:8px">
        <div class="event-inactive" id="eventInactive" style="height:auto;padding:8px 0">
          <div style="font-size:24px;opacity:0.3">🛸</div>
          <div style="font-size:11px;color:var(--text-secondary)">イベント待機中</div>
        </div>
        <div class="event-active" id="eventActive" style="height:auto;background:rgba(255,136,0,0.1);border:2px solid rgba(255,136,0,0.5);border-radius:10px;padding:12px;text-align:center;animation:eventGlow 2s infinite;">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="db.js"></script>

<script>
// === ミッションコントロール画面 ===
let currentMission = null;
let activeEvent = null;
let feedItems = [];
const MAX_FEED = 12;
let previousMilestoneState = {};

// 時計更新
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}
setInterval(updateClock, 1000);
updateClock();

// ライブフィードに追加
function addFeed(icon, text, type = '') {
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  feedItems.unshift({ icon, text, time, type });
  if (feedItems.length > MAX_FEED) feedItems.pop();
  renderFeed();
}

function renderFeed() {
  const el = document.getElementById('feedList');
  el.innerHTML = feedItems.map(f =>
    `<div class="feed-item ${f.type}">
      <span class="feed-time">${f.time}</span>
      <span class="feed-icon">${f.icon}</span>
      <span class="feed-text">${f.text}</span>
    </div>`
  ).join('');
}

// ミッション表示更新
function renderMission(mission) {
  if (!mission) {
    document.getElementById('missionName').textContent = '現在アクティブなミッションはありません';
    document.getElementById('missionMetric').textContent = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = '--';
    document.getElementById('progressValues').textContent = '';
    document.getElementById('missionDays').textContent = '';
    document.getElementById('milestones').innerHTML = '';
    return;
  }

  currentMission = mission;
  const percent = Math.min(100, Math.round((mission.currentValue / mission.targetValue) * 100));

  const metricLabels = {
    total_hours: '全クルー合計学習時間',
    total_pomodoros: '全クルー合計ポモドーロ数',
    teaching_count: '教え合い発生回数',
    ai_problems: 'AI教材取組問題数',
    all_streak: '全クルー同時連続通塾日数'
  };

  document.getElementById('missionName').textContent = mission.title;
  document.getElementById('missionMetric').textContent =
    `計測指標: ${metricLabels[mission.metric] || mission.metric}`;
  document.getElementById('progressBar').style.width = percent + '%';
  document.getElementById('progressText').textContent = percent + '%';
  document.getElementById('progressValues').textContent =
    `${mission.currentValue.toLocaleString()} / ${mission.targetValue.toLocaleString()}`;

  // 残り日数
  if (mission.endDate) {
    const end = new Date(mission.endDate);
    const now = new Date();
    const days = Math.max(0, Math.ceil((end - now) / 86400000));
    document.getElementById('missionDays').textContent = `残り ${days} 日`;
  }

  // マイルストーン
  const ms = mission.milestones || [];
  document.getElementById('milestones').innerHTML = ms.map(m =>
    `<div class="milestone ${m.reached ? 'reached' : ''}">
      <div class="stage">${m.percent}%</div>
      <div class="name">${m.reached ? '✅ ' : ''}${m.name}</div>
      <div class="coins">+${m.coins} pt</div>
    </div>`
  ).join('');

  // 新たに到達したマイルストーンの検出
  ms.forEach(m => {
    const key = `${mission.id}_${m.stage}`;
    if (m.reached && !previousMilestoneState[key]) {
      addFeed('🎉', `マイルストーン「${m.name}」到達！ 全クルーに+${m.coins}ポイント`, 'milestone-feed');
    }
    previousMilestoneState[key] = m.reached;
  });

  // ミッション達成
  if (mission.status === 'completed') {
    showMissionComplete(mission);
  }
}

// ランキング表示（月間ポイント獲得量・上位5名）
async function renderRanking() {
  try {
    const students = await StudentsDB.getAll();
    // 月間獲得量で並べる（totalEarnedがない場合はtotalPoints使用）
    const sorted = students
      .filter(s => s.rank !== 'rookie') // ルーキーは非表示
      .sort((a, b) => (b.totalEarned || b.totalPoints || 0) - (a.totalEarned || a.totalPoints || 0))
      .slice(0, 5);

    const el = document.getElementById('rankingList');
    el.innerHTML = sorted.map((s, i) => {
      const rank = getRankInfo(s.rank || 'crew');
      const coins = s.totalEarned || s.totalPoints || 0;
      const displayName = s.callsign || s.nickname || s.name;
      return `<div class="ranking-item">
        <span class="ranking-pos">${i + 1}</span>
        <span class="ranking-rank-icon">${rank.icon}</span>
        <span class="ranking-name">${displayName}</span>
        <span class="ranking-coins">${coins.toLocaleString()}</span>
      </div>`;
    }).join('');

    document.getElementById('crewCount').textContent = students.length;
  } catch(e) {
    console.error('ランキング取得エラー:', e);
  }
}

// 本日の統計
async function renderStats() {
  try {
    const today = getToday();
    const logs = await StudyLogsDB.getByDate(today);
    const students = await StudentsDB.getAll();

    const totalMin = logs.reduce((s, l) => s + (l.duration || 0), 0);
    const totalPomo = logs.reduce((s, l) => s + (l.pomodoroCount || 0), 0);
    const bestStreak = Math.max(0, ...students.map(s => s.streak || 0));

    document.getElementById('statStudyHours').textContent =
      (totalMin / 60).toFixed(1);
    document.getElementById('statPomodoros').textContent = totalPomo;
    document.getElementById('statStreak').textContent = bestStreak;

    // 発行ポイント数
    try {
      const summary = await CoinsDB.getDailySummary(today);
      document.getElementById('statCoinsIssued').textContent = summary.totalIssued;
    } catch(e) {
      document.getElementById('statCoinsIssued').textContent = '--';
    }
  } catch(e) {
    console.error('統計取得エラー:', e);
  }
}

// イベント表示
async function renderEvent() {
  try {
    const events = await EventsDB.getActive();
    if (events.length > 0) {
      const ev = events[0];
      activeEvent = ev;
      document.getElementById('eventInactive').style.display = 'none';
      document.getElementById('eventActive').classList.add('show');

      const typeLabels = {
        multiplier: '🚀 ブースター',
        bonus: '🎁 ボーナス',
        challenge: '⚔️ チャレンジ',
        surprise: '🎉 サプライズ'
      };
      document.getElementById('eventName').textContent = typeLabels[ev.type] || ev.name;

      if (ev.type === 'multiplier') {
        document.getElementById('eventMultiplier').textContent = `×${ev.multiplier}`;
      } else if (ev.type === 'bonus' || ev.type === 'surprise') {
        document.getElementById('eventMultiplier').textContent = `+${ev.bonusCoins}`;
      } else {
        document.getElementById('eventMultiplier').textContent = '⚡';
      }

      document.getElementById('eventDescription').textContent = ev.description || '';

      // 残り時間カウントダウン
      updateEventTimer(ev);
    } else {
      activeEvent = null;
      document.getElementById('eventInactive').style.display = 'flex';
      document.getElementById('eventActive').classList.remove('show');
    }
  } catch(e) {
    console.error('イベント取得エラー:', e);
  }
}

function updateEventTimer(ev) {
  if (!ev || !ev.activatedAt) return;
  const activated = ev.activatedAt.toDate ? ev.activatedAt.toDate() : new Date(ev.activatedAt);
  const endTime = new Date(activated.getTime() + (ev.durationMinutes || 30) * 60000);
  const now = new Date();
  const remaining = Math.max(0, endTime - now);
  const min = Math.floor(remaining / 60000);
  const sec = Math.floor((remaining % 60000) / 1000);
  document.getElementById('eventTimer').textContent =
    `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

  if (remaining <= 0) {
    renderEvent(); // 終了したら再チェック
  }
}

// イベント発火オーバーレイ
function showEventOverlay(name, icon, desc) {
  document.getElementById('eventOverlayIcon').textContent = icon;
  document.getElementById('eventOverlayTitle').textContent = name;
  document.getElementById('eventOverlayDesc').textContent = desc;
  document.getElementById('eventOverlay').classList.add('show');
  setTimeout(() => {
    document.getElementById('eventOverlay').classList.remove('show');
  }, 4000);
}

// ミッション達成オーバーレイ
function showMissionComplete(mission) {
  document.getElementById('missionCompleteSub').textContent =
    `「${mission.title}」達成！ 全クルーに+${mission.bonusCoins}ポイント`;
  document.getElementById('missionCompleteOverlay').classList.add('show');
  setTimeout(() => {
    document.getElementById('missionCompleteOverlay').classList.remove('show');
  }, 8000);
}

// リアルタイムリスナー
function setupListeners() {
  // ミッションのリアルタイム監視
  db.collection('missions').where('status', '==', 'active')
    .onSnapshot(snap => {
      if (!snap.empty) {
        const mission = { id: snap.docs[0].id, ...snap.docs[0].data() };
        renderMission(mission);
      } else {
        renderMission(null);
      }
    });

  // イベントのリアルタイム監視
  db.collection('events').where('active', '==', true)
    .onSnapshot(snap => {
      if (!snap.empty) {
        const ev = { id: snap.docs[0].id, ...snap.docs[0].data() };
        if (!activeEvent || activeEvent.id !== ev.id) {
          // 新しいイベントが発火された
          const typeIcons = { multiplier: '🚀', bonus: '🎁', challenge: '⚔️', surprise: '🎉' };
          showEventOverlay(
            ev.name || ev.type,
            typeIcons[ev.type] || '⚡',
            ev.description || 'イベント発動中！'
          );
          addFeed(typeIcons[ev.type] || '⚡', `イベント「${ev.name || ev.type}」発動！`, 'special');
        }
        activeEvent = ev;
        renderEvent();
      } else {
        if (activeEvent) {
          addFeed('🏁', 'イベント終了');
        }
        activeEvent = null;
        renderEvent();
      }
    });

  // 学習ログのリアルタイム監視（ライブフィード用）
  const today = getToday();
  db.collection('studyLogs').where('date', '==', today)
    .orderBy('createdAt', 'desc').limit(1)
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if (change.type === 'added') {
          const log = change.doc.data();
          const subjectIcons = { '国語': '📕', '数学': '📐', '英語': '🔤', '理科': '🔬', '社会': '🌍', 'その他': '📝' };
          const icon = subjectIcons[log.subject] || '📖';
          const dur = log.duration || 0;
          const name = log.studentName || 'クルー';
          addFeed(icon, `${name} が ${log.subject} を ${dur}分 学習完了`);
        }
      });
      renderStats();
    });

  // ポイント取引のリアルタイム監視
  db.collection('coins').orderBy('timestamp', 'desc').limit(1)
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if (change.type === 'added') {
          const txn = change.doc.data();
          if (txn.amount > 0 && txn.category !== 'manual') {
            const catIcons = {
              attendance: '🏫', pomodoro: '🍅', review: '📝', teaching: '🤝',
              streak: '🔥', mission: '🎯', event: '⚡', gift: '🎁'
            };
            const icon = catIcons[txn.category] || 'pt';
            // ライブフィードに表示（頻度調整のため一部のみ）
          }
        }
      });
      renderStats();
    });

  // アクティブセッション（現在出撃中）の監視
  let prevActiveIds = new Set();
  db.collection('activeSessions').where('active', '==', true)
    .onSnapshot(async snap => {
      const sessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const currentIds = new Set(sessions.map(s => s.id));
      // 新しく出撃した生徒をフィードに追加
      const students = await StudentsDB.getAll();
      const sMap = {};
      students.forEach(s => { sMap[s.id] = s; });

      sessions.forEach(sess => {
        if (!prevActiveIds.has(sess.id)) {
          const st = sMap[sess.id];
          const display = st ? (st.callsign || st.nickname || st.name) : 'クルー';
          addFeed('🚀', `${display} が ${sess.subject} に出撃！`);
        }
      });
      // 帰還した生徒
      prevActiveIds.forEach(id => {
        if (!currentIds.has(id)) {
          const st = sMap[id];
          const display = st ? (st.callsign || st.nickname || st.name) : 'クルー';
          addFeed('✅', `${display} が帰還！`, 'milestone-feed');
        }
      });
      prevActiveIds = currentIds;

      // 統計パネル横に出撃中人数を表示
      const crewCount = document.getElementById('crewCount');
      if (crewCount) {
        const total = students.length;
        crewCount.textContent = sessions.length > 0 ? `${total} (${sessions.length}名出撃中)` : total;
      }
    }, () => {});
}

// イベントタイマー定期更新
setInterval(() => {
  if (activeEvent) updateEventTimer(activeEvent);
}, 1000);

// ============================================
// 宇宙マップ（全生徒位置表示）
// ============================================
async function renderSpaceMap() {
  try {
    const students = await StudentsDB.getAll();
    const container = document.getElementById('spacemapList');
    // Group students by station
    const stationGroups = {};
    students.forEach(s => {
      const station = SpaceMapDB.getStation(s.totalPoints || 0);
      if (!stationGroups[station.id]) stationGroups[station.id] = { station, students: [] };
      stationGroups[station.id].students.push(s);
    });
    // Sort stations by level descending
    const sorted = Object.values(stationGroups).sort((a, b) => b.station.level - a.station.level);
    container.innerHTML = sorted.map(g => `
      <div style="margin-bottom:2px">
        <div style="font-size:10px;color:var(--accent-blue);font-family:'Orbitron',monospace;margin-bottom:2px">
          ${g.station.icon} ${g.station.name} <span style="color:var(--text-secondary)">Lv.${g.station.level}</span>
        </div>
        ${g.students.map(s => `
          <div class="spacemap-student">
            <span class="spacemap-student-name">${s.callsign || s.nickname || s.name}</span>
            <span style="font-size:10px;color:var(--accent-green)">${(s.totalPoints || 0).toLocaleString()}pt</span>
          </div>
        `).join('')}
      </div>
    `).join('');
  } catch(e) { console.error('SpaceMap error:', e); }
}

// ============================================
// ストーリー表示
// ============================================
async function renderStoryPanel() {
  const container = document.getElementById('storyDisplay');
  try {
    // Current month theme
    let html = '';
    if (typeof getCurrentStoryTheme === 'function') {
      const theme = getCurrentStoryTheme();
      if (theme) {
        html += `
          <div class="story-theme-icon">${theme.icon}</div>
          <div class="story-theme-name">${theme.code}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">${theme.name}</div>
        `;
      }
    }

    // Active chapter
    const chapter = await StoryDB.getActive();
    if (chapter) {
      const weekText = StoryDB.getWeeklyText(chapter);
      if (weekText) {
        html += `<div class="story-weekly-text">${weekText}</div>`;
      }
      html += '<div class="story-routes">';
      (chapter.routes || []).forEach(r => {
        const pct = r.targetValue > 0 ? Math.min(100, (r.currentValue || 0) / r.targetValue * 100) : 0;
        html += `
          <div class="story-route">
            <span>${r.icon || '⭐'}</span>
            <span style="flex-shrink:0;width:50px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</span>
            <div class="story-route-bar">
              <div class="story-route-fill" style="width:${pct}%"></div>
            </div>
            <span style="color:var(--accent-purple);font-family:'Orbitron',monospace;font-size:10px">${Math.round(pct)}%</span>
          </div>
        `;
      });
      html += '</div>';
    } else {
      html += '<div style="color:var(--text-secondary);font-size:11px;margin-top:4px">チャプター未設定</div>';
    }
    container.innerHTML = html;
  } catch(e) {
    console.error('Story error:', e);
    container.innerHTML = '<div style="color:var(--text-secondary);font-size:11px">ストーリー読込失敗</div>';
  }
}

// ============================================
// レイドボス表示（弱点・耐性・特殊能力付き）
// ============================================
async function renderBossPanel() {
  const container = document.getElementById('bossDisplay');
  try {
    const bosses = await RaidBossDB.getActive();
    if (bosses.length === 0) {
      container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);font-size:12px;padding:20px">ボスなし</div>';
      return;
    }
    container.innerHTML = bosses.map(b => {
      const hpPct = b.maxHp > 0 ? Math.max(0, (b.currentHp / b.maxHp) * 100) : 0;
      return `
        <div class="boss-mini">
          <div class="boss-mini-header">
            <span class="boss-mini-icon">${b.icon || '👹'}</span>
            <span class="boss-mini-name">${b.name}</span>
            <span style="font-size:10px;color:var(--text-secondary)">${Math.round(hpPct)}%</span>
          </div>
          <div class="boss-mini-hp">
            <div class="boss-mini-hp-fill" style="width:${hpPct}%"></div>
          </div>
          <div style="font-size:10px;color:var(--text-secondary);margin-bottom:4px">HP: ${b.currentHp.toLocaleString()} / ${b.maxHp.toLocaleString()}</div>
          <div class="boss-mini-attrs">
            ${b.weakness ? `<span class="boss-attr-tag boss-attr-weak">🔥${b.weakness}</span>` : ''}
            ${b.resistance ? `<span class="boss-attr-tag boss-attr-resist">🛡${b.resistance}</span>` : ''}
            ${b.specialAbility ? `<span class="boss-attr-tag boss-attr-special">⚡${b.specialAbility.name || b.specialAbility.type}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    console.error('Boss error:', e);
    // インデックス未作成やボスなしの場合は「待機中」と表示
    container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);font-size:12px;padding:20px">🛸 待機中</div>';
  }
}

// コマンダーバフ演出
// ============================================
let commanderBuffShown = { point: false, boss: false };
async function checkCommanderBuff() {
  try {
    const activeBuffs = await CommanderBuffDB.getActive();
    const pointBuff = activeBuffs.find(b => b.type === 'point_boost');
    const bossBuff = activeBuffs.find(b => b.type === 'boss_boost');
    if (pointBuff && !commanderBuffShown.point) {
      commanderBuffShown.point = true;
      showCommanderBuff();
      addFeed('📡', 'コマンダーから通信ブースト！全クルーのポイント+20%！', 'special');
    }
    if (bossBuff && !commanderBuffShown.boss) {
      commanderBuffShown.boss = true;
      showCommanderBuff();
      addFeed('⚔️', 'コマンダーから総員攻撃命令！ボスダメージ×1.5発動中！', 'special');
    }
  } catch(e) {}
}

function showCommanderBuff() {
  const overlay = document.getElementById('commanderBuffOverlay');
  const banner = document.getElementById('commanderBuffBanner');
  overlay.classList.add('show');
  banner.style.display = 'block';
  setTimeout(() => {
    overlay.classList.remove('show');
  }, 3000);
  setTimeout(() => {
    banner.style.display = 'none';
  }, 4000);
}

// 初期化
async function generateBriefingNarration() {
  try {
    const students = await StudentsDB.getAll();
    const today = new Date().toISOString().split('T')[0];
    const todayLogs = await StudyLogsDB.getByDate(today);
    const bosses = await RaidBossDB.getActive();
    const boss = bosses.length > 0 ? bosses[0] : null;
    const story = await StoryDB.getActive();

    const totalCrew = students.length;
    const activeCrew = new Set(todayLogs.map(l => l.studentId)).size;
    const todayMinutes = todayLogs.reduce((s, l) => s + (l.duration || 0), 0);

    const parts = [];
    const hour = new Date().getHours();

    // 宇宙艦隊の状況報告
    if (hour < 12) parts.push('航海日誌 — 本日の航海が始動。');
    else if (hour < 17) parts.push('航海日誌 — 午後の探索フェーズ。');
    else parts.push('航海日誌 — 本日の航海は終盤を迎えている。');

    parts.push(`全${totalCrew}名のクルーのうち${activeCrew}名が任務中。`);

    if (todayMinutes > 0) {
      parts.push(`艦隊の総学習時間は${Math.floor(todayMinutes / 60)}時間${todayMinutes % 60}分。`);
    } else {
      parts.push('まだ本日の学習記録はない。');
    }

    if (boss) {
      const hpPct = Math.round((boss.currentHp / boss.maxHp) * 100);
      if (hpPct <= 25) parts.push(`${boss.icon || '👹'}${boss.name}は瀕死！ 討伐の好機だ。`);
      else if (hpPct <= 50) parts.push(`${boss.icon || '👹'}${boss.name}のHP${hpPct}%。攻勢を維持せよ。`);
      else parts.push(`前方に${boss.icon || '👹'}${boss.name}を確認。HP${hpPct}%。`);
    }

    if (story) {
      const weekNum = Math.min(4, Math.ceil(new Date().getDate() / 7));
      const weekText = story.weeklyTexts && story.weeklyTexts[weekNum - 1];
      if (weekText) parts.push(weekText);
    }

    document.getElementById('briefingNarrationText').textContent = parts.join(' ');
  } catch(e) { console.error('Briefing narration error:', e); }
}

// ギルド進捗表示
async function renderGuildProgress() {
  const container = document.getElementById('guildProgressDisplay');
  try {
    const guilds = await GuildsDB.getProgress();
    if (guilds.length === 0) { container.innerHTML = '<div style="color:var(--text-secondary);font-size:11px">ギルドなし</div>'; return; }
    container.innerHTML = guilds.map(g => {
      const ms = g.milestones || (typeof GUILD_MILESTONES !== 'undefined' ? GUILD_MILESTONES.map(m => ({...m, unlocked: false})) : []);
      const nextMs = ms.find(m => !m.unlocked);
      const pct = nextMs ? Math.min(100, Math.round((g.totalPoints || 0) / nextMs.threshold * 100)) : 100;
      const msIcons = ms.map(m => '<span style="opacity:' + (m.unlocked ? '1' : '0.3') + ';font-size:12px">' + m.icon + '</span>').join(' ');
      return '<div style="background:linear-gradient(135deg,' + (g.color||'#667eea') + '40,' + (g.color||'#667eea') + '15);border:1px solid ' + (g.color||'#667eea') + '60;border-radius:8px;padding:8px 10px;margin-bottom:4px;">' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">' +
        '<span style="font-size:16px">' + (g.icon||'⚔️') + '</span>' +
        '<span style="font-size:12px;font-weight:700;flex:1;color:#e8ecff">' + g.name + '</span>' +
        '<span style="font-size:10px;color:' + (g.color||'#00d4ff') + ';font-family:Orbitron,monospace">' + (g.totalPoints||0).toLocaleString() + '</span>' +
        '</div>' +
        '<div style="background:rgba(0,0,0,0.3);border-radius:4px;height:5px;margin-bottom:3px"><div style="background:' + (g.color||'#00d4ff') + ';height:5px;border-radius:4px;width:' + pct + '%;transition:width 1s"></div></div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center"><div>' + msIcons + '</div><div style="font-size:9px;color:var(--text-secondary)">' + (nextMs ? '次: ' + nextMs.icon + nextMs.name : '全達成!') + '</div></div>' +
        '</div>';
    }).join('');
  } catch(e) { console.error('Guild progress error:', e); container.innerHTML = ''; }
}

// リーグランキング表示
async function renderLeagueRanking() {
  const container = document.getElementById('leagueRankDisplay');
  try {
    if (typeof LEAGUES === 'undefined') { container.innerHTML = ''; return; }
    const students = await StudentsDB.getAll();
    let html = '';
    for (const [id, league] of Object.entries(LEAGUES)) {
      const ls = students.filter(s => getLeague(s.grade) === id).sort((a,b) => (b.totalPoints||0) - (a.totalPoints||0)).slice(0, 3);
      if (ls.length === 0) continue;
      html += '<div style="margin-bottom:8px">';
      html += '<div style="font-size:10px;font-family:Orbitron,monospace;color:' + league.color + ';margin-bottom:4px;letter-spacing:1px">' + league.icon + ' ' + league.name + '</div>';
      ls.forEach((s, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
        const display = s.callsign || s.nickname || '???';
        html += '<div style="display:flex;align-items:center;gap:6px;padding:3px 6px;background:var(--bg-card);border-radius:4px;margin-bottom:2px;font-size:11px">' +
          '<span>' + medal + '</span>' +
          '<span style="flex:1;font-weight:600">' + display + '</span>' +
          '<span style="color:var(--accent-orange);font-family:Orbitron,monospace;font-size:10px">' + (s.totalPoints||0).toLocaleString() + '</span>' +
          '</div>';
      });
      html += '</div>';
    }
    container.innerHTML = html || '<div style="color:var(--text-secondary);font-size:11px">データなし</div>';
  } catch(e) { console.error('League ranking error:', e); }
}

async function init() {
  try {
    await Promise.all([
      renderRanking(),
      renderStats(),
      renderEvent(),
      renderSpaceMap(),
      renderBossPanel(),
      renderGuildProgress(),
      renderLeagueRanking()
    ]);

    // 初期フィードメッセージ
    addFeed('🛸', 'ミッションコントロール起動完了');

    setupListeners();

    // コマンダーバフチェック
    checkCommanderBuff();

    // ナレーション生成
    generateBriefingNarration();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch(e) {
    console.error('初期化エラー:', e);
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--accent-red);font-family:'Orbitron',monospace">SYSTEM ERROR</div>
       <div style="color:var(--text-secondary);margin-top:8px">${e.message}</div>`;
  }
}

// 定期リフレッシュ（5分おき）
setInterval(async () => {
  await renderRanking();
  await renderStats();
  await renderSpaceMap();
  await renderBossPanel();
  await renderGuildProgress();
  await renderLeagueRanking();
  checkCommanderBuff();
}, 300000);

init();
</script>
